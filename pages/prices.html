<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Supplier published price watch for Beaufort County and regional food sources, compiled from public prices we can verify.">
  <title>Prices — Port Royal Sounder</title>
  <link rel="icon" type="image/png" href="../assets/logo-mark.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="../style.css?v=20260612-no-horizontal-scroll">
  <script src="../scripts/site-shell.js?v=20260612-home-frequency" defer></script>
  <script src="../scripts/prices.js?v=20260612-prices-map" defer></script>
</head>
<body>

  <div id="site-header"></div>

  <div id="site-content">
    <main>
      <div class="container">
        <section class="section newsletter-section">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="../index.html">Home</a> &rsaquo; Prices
          </nav>

          <p class="page-action-row">
            <a class="count-map-link page-map-link" href="#prices-map" data-map-jump="prices-map">
              <span aria-hidden="true">🗺️</span><span>Map</span>
            </a>
          </p>

          <div id="prices-latest"></div>
        </section>

        <section class="section" aria-labelledby="prices-map-title">
          <h2 class="section-title" id="prices-map-title">Map</h2>
          <div class="map-canvas" id="prices-map" tabindex="-1" aria-label="Price source locations map"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="site-footer"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../scripts/map.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.initPricesPage({
        mountId: 'prices-latest',
        dataPath: '../data/prices.json'
      });
      window.initDirectoryMap({
        mapId: 'prices-map',
        dataSources: ['../data/price-source-map.csv']
      });
    });
  </script>

</body>
</html>
