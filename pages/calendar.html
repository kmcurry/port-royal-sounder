<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calendar of local markets, community events, arts, and Lowcountry happenings around Beaufort and Port Royal.">
  <title>Calendar — Port Royal Sounder</title>
  <link rel="icon" type="image/png" href="../assets/logo-mark.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="../style.css?v=20260612-no-horizontal-scroll">
  <script src="../scripts/site-shell.js?v=20260612-home-frequency" defer></script>
</head>
<body>

  <div id="site-header"></div>

  <div id="site-content">

  <section class="page-hero" aria-labelledby="page-title">
    <div class="container">
      <h1 id="page-title">📅 Calendar</h1>
      <p>A compiled view of local markets, community events, culture, and Beaufort-area happenings.</p>
    </div>
  </section>

  <main>
    <div class="container">
      <section class="section">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../index.html">Home</a> &rsaquo; Calendar
        </nav>

        <div class="calendar-page" id="calendar-page">
          <div class="calendar-controls">
            <div class="search-bar">
              <label for="calendar-search">Search:</label>
              <input type="search" id="calendar-search" data-calendar-search placeholder="Filter events by name, tag, source, location, or notes...">
              <span class="calendar-count" data-calendar-count></span>
            </div>
            <div class="calendar-range-picker" aria-label="Date range">
              <div class="calendar-range-presets" role="group" aria-label="Date range presets">
                <button type="button" class="calendar-range-preset" data-calendar-range-preset="7">7 days</button>
                <button type="button" class="calendar-range-preset" data-calendar-range-preset="30">30 days</button>
                <button type="button" class="calendar-range-preset" data-calendar-range-preset="custom">Custom range</button>
              </div>
              <div class="calendar-custom-range" data-calendar-custom-range hidden>
                <label for="calendar-range-start">Start</label>
                <input type="date" id="calendar-range-start" data-calendar-range-start>
                <label for="calendar-range-end">End</label>
                <input type="date" id="calendar-range-end" data-calendar-range-end>
              </div>
            </div>
            <div class="calendar-filters">
              <button type="button" class="newsletter-button calendar-clear" data-calendar-clear>Clear Filters</button>
            </div>
          </div>

          <section class="tag-legend" data-calendar-legend aria-label="Calendar category filters"></section>

          <section class="calendar-list-section" data-calendar-list-section>
            <h2 class="section-title">Upcoming Events</h2>
            <div class="calendar-event-list" data-calendar-list></div>
          </section>

          <section class="calendar-panel" data-calendar-month>
            <div class="calendar-header">
              <button type="button" class="calendar-nav-button" data-calendar-prev>&larr;</button>
              <h2 class="section-title calendar-month-label">Month</h2>
              <button type="button" class="calendar-nav-button" data-calendar-next>&rarr;</button>
            </div>
            <div class="calendar-weekdays">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>
            <div class="calendar-grid"></div>
          </section>

          <section class="section" aria-labelledby="calendar-map-title">
            <h2 class="section-title" id="calendar-map-title">Map</h2>
            <div class="map-canvas" id="calendar-map" aria-label="Calendar event locations map"></div>
          </section>
        </div>
      </section>
    </div>
  </main>
  </div>

  <div id="site-footer"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../scripts/map.js"></script>
  <script src="../scripts/calendar.js?v=20260612-calendar-map-overflow"></script>
  <script>
    window.initDirectoryMap({
      mapId: 'calendar-map',
      dataSources: ['../data/events.csv']
    });
    window.initCalendarPage({
      rootId: 'calendar-page',
      csvPath: '../data/events.csv',
      mapId: 'calendar-map'
    });
  </script>

</body>
</html>
