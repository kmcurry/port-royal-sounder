<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Local activities around Beaufort and Port Royal, South Carolina — Port Royal Sounder directory.">
  <title>Activities — Port Royal Sounder</title>
  <link rel="icon" type="image/png" href="../assets/logo-mark.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="../style.css">
  <script src="../scripts/site-shell.js" defer></script>
</head>
<body>

  <div id="site-header"></div>

  <div id="site-content">
    <!-- ===== Page Hero ===== -->
    <section class="page-hero" aria-labelledby="page-title">
      <div class="container">
        <h1 id="page-title">🚶 Activities</h1>
        <p>Outdoor adventures, events, and local experiences around Beaufort &amp; Port Royal.</p>
      </div>
    </section>

    <!-- ===== Main Content ===== -->
    <main>
      <div class="container">
        <section class="section">

          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="../index.html">Home</a> &rsaquo; Activities
          </nav>

          <section class="tag-legend" id="tag-legend"></section>

          <div class="search-bar">
            <label for="search-input">Search:</label>
            <input
              type="search"
              id="search-input"
              placeholder="Filter activities by name, tag, location, or season&hellip;"
              aria-label="Search activities"
            >
            <span id="row-count" aria-live="polite" aria-atomic="true"></span>
          </div>

          <div class="table-wrapper">
            <table class="data-table" id="data-table" aria-label="Activities directory">
              <thead></thead>
              <tbody>
                <tr><td>Loading data&hellip;</td></tr>
              </tbody>
            </table>
          </div>

          <section class="section" aria-labelledby="activities-map-title">
            <h2 class="section-title" id="activities-map-title">Map</h2>
            <div class="map-canvas" id="map" aria-label="Activities locations map"></div>
          </section>

        </section>
      </div>
    </main>
  </div>

  <div id="site-footer"></div>

  <script src="../scripts/table.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../scripts/map.js"></script>
  <script>
    window.renderTagLegend('tag-legend');

    initTable({
      csvPath: '../data/activities.csv',
      tableId: 'data-table',
      searchId: 'search-input',
      countId: 'row-count',
      legendId: 'tag-legend',
      mapId: 'map',
      hiddenHeaders: ['Availability']
    });
    window.initDirectoryMap({
      mapId: 'map',
      dataSources: ['../data/activities.csv']
    });
  </script>

</body>
</html>
