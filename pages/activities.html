<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Local activities around Beaufort and Port Royal, South Carolina — Port Royal Sounder directory.">
  <title>Activities — Port Royal Sounder</title>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="container">
      <a class="brand" href="../index.html">
        <img src="../assets/logo.png" alt="" class="brand-logo">
        <span>Port Royal Sounder</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="activities.html">Activities</a>
        <a href="bakeries.html">Bakeries</a>
        <a href="breweries.html">Breweries</a>
        <a href="distilleries.html">Distilleries</a>
        <a href="farms.html">Farms</a>
        <a href="markets.html">Markets</a>
        <a href="music.html">Music</a>
        <a href="pets.html">Pets</a>
        <a href="seafood.html">Seafood</a>
        <a href="sports.html">Sports</a>
        <a href="wineries.html">Wineries</a>
      </nav>
    </div>
  </header>

  <!-- ===== Page Hero ===== -->
  <section class="page-hero" aria-labelledby="page-title">
    <div class="container">
      <h1 id="page-title">🚶 Activities</h1>
      <p>Outdoor adventures, events, and local experiences around Beaufort &amp; Port Royal.</p>
    </div>
  </section>

  <!-- ===== Main Content ===== -->
  <main>
    <div class="container">
      <section class="section">

        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../index.html">Home</a> &rsaquo; Activities
        </nav>

        <section class="type-legend" id="type-legend" aria-labelledby="type-legend-title"></section>

        <div class="search-bar">
          <label for="search-input">Search:</label>
          <input
            type="search"
            id="search-input"
            placeholder="Filter activities by name, type, location, or season&hellip;"
            aria-label="Search activities"
          >
          <span id="row-count" aria-live="polite" aria-atomic="true"></span>
        </div>

        <div class="table-wrapper">
          <table class="data-table" id="data-table" aria-label="Activities directory">
            <thead></thead>
            <tbody>
              <tr><td>Loading data&hellip;</td></tr>
            </tbody>
          </table>
        </div>

        <section class="section" aria-labelledby="activities-map-title">
          <h2 class="section-title" id="activities-map-title">Map</h2>
          <div class="map-canvas" id="map" aria-label="Activities locations map"></div>
        </section>

      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Port Royal Sounder &mdash; Beaufort &amp; Port Royal, SC</p>
    </div>
  </footer>

  <script src="../scripts/table.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../scripts/map.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    window.renderTypeLegend('type-legend');

    initTable({
      csvPath: '../data/activities.csv',
      tableId: 'data-table',
      searchId: 'search-input',
      countId: 'row-count',
      legendId: 'type-legend',
      mapId: 'map'
    });
    window.initDirectoryMap({
      mapId: 'map',
      dataSources: ['../data/activities.csv']
    });
  </script>

</body>
</html>
