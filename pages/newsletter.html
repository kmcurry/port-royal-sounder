<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Subscribe to the Port Royal Sounder newsletter for local finds, events, and fresh Lowcountry recommendations.">
  <title>Newsletter — Port Royal Sounder</title>
  <link rel="icon" type="image/png" href="../assets/logo-mark.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="../style.css">
  <script src="../scripts/site-shell.js" defer></script>
  <script src="../scripts/newsletter.js" defer></script>
</head>
<body>

  <div id="site-header"></div>

  <div id="site-content">

  <section class="page-hero" aria-labelledby="page-title">
    <div class="container">
      <h1 id="page-title">Newsletter</h1>
      <p>Get fresh Lowcountry finds, local events, and new directory highlights in your inbox.</p>
    </div>
  </section>

  <main>
    <div class="container">
      <section class="section newsletter-section">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../index.html">Home</a> &rsaquo; Newsletter
        </nav>

        <div class="newsletter-card">
          <h2 class="section-title">Sign Up</h2>
          <p class="newsletter-copy">A simple local roundup of places worth checking out around Beaufort, Port Royal, and the nearby coast.</p>
          <form
            action="https://buttondown.com/api/emails/embed-subscribe/port-royal-sounder"
            method="post"
            class="embeddable-buttondown-form newsletter-form"
          >
            <label for="bd-email">Enter your email</label>
            <div class="newsletter-form-row">
              <input type="email" name="email" id="bd-email" required>
              <input type="submit" value="Subscribe">
            </div>
            <p class="newsletter-powered">
              <a href="privacy.html">Port Royal Sounder respects privacy.</a>
            </p>
          </form>
        </div>

        <div id="newsletter-latest-issue"></div>
      </section>
    </div>
  </main>
  </div>

  <div id="site-footer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.initNewsletterPage({
        mountId: 'newsletter-latest-issue',
        dataPath: '../data/newsletter-issues.json'
      });
    });
  </script>

</body>
</html>
