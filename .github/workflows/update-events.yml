name: Update Events

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Import subscribed event feeds
        run: node scripts/import-events.js

      - name: Commit updated calendar data
        run: |
          if git diff --quiet -- data/events.csv; then
            echo "No event changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.csv
          git commit -m "Update subscribed event feeds"
          git push
