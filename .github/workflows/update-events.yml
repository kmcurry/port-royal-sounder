name: Update Events And Newsletter

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Import subscribed event feeds
        run: node scripts/import-events.js

      - name: Build weekly newsletter issue
        run: node scripts/build-newsletter.js

      - name: Commit updated calendar and newsletter data
        run: |
          if git diff --quiet -- data/events.csv data/newsletter-issues.json; then
            echo "No content changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.csv data/newsletter-issues.json
          git commit -m "Update events and newsletter"
          git push
