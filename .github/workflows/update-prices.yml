name: Update Prices

on:
  workflow_dispatch:
  schedule:
    - cron: '23 10 * * *'

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build daily prices board
        run: node scripts/build-prices.js

      - name: Commit updated prices data
        run: |
          if git diff --quiet -- data/prices.json; then
            echo "No price changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git commit -m "Update daily prices"
          git push
