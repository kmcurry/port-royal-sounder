<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Port Royal Sounder — the local directory of activities, bakeries, breweries, butchers, distilleries, farms, food trucks, markets, pets, seafood, and wineries around Beaufort and Port Royal, South Carolina.">
  <title>Port Royal Sounder</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
  <script src="scripts/site-shell.js" defer></script>
  <script src="scripts/table.js" defer></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
  <script src="scripts/map.js" defer></script>
</head>
<body>

  <div id="site-header"></div>

  <div id="site-content">
    <!-- ===== Navigation Cards ===== -->
    <main>
      <div class="container">
        <section class="section" aria-labelledby="directory-title">

          <section class="type-legend" id="type-legend" aria-labelledby="type-legend-title"></section>

          <section class="newsletter-callout newsletter-callout-inline" aria-labelledby="newsletter-title">
            <div class="newsletter-callout-copy">
              <h2 class="section-title" id="newsletter-title">Get The Newsletter</h2>
              <p>Subscribe to get a curated guide for living in Beaufort County, South Carolina, delivered weekly to your inbox</p>
            </div>
            <a class="newsletter-button" href="pages/newsletter.html">Sign Up</a>
          </section>

          <div class="search-bar">
            <label for="search-input">Search:</label>
            <input
              type="search"
              id="search-input"
              placeholder="Filter the full directory by name, type, location, or notes&hellip;"
              aria-label="Search the full directory"
            >
            <span id="row-count" aria-live="polite" aria-atomic="true"></span>
          </div>

          <div class="table-wrapper">
            <table class="data-table" id="data-table" aria-label="Full directory">
              <thead></thead>
              <tbody>
                <tr><td>Loading data&hellip;</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- ===== Map Placeholder ===== -->
        <section class="section" aria-labelledby="map-title">
          <h2 class="section-title" id="map-title">Map</h2>
          <div class="map-canvas" id="map" aria-label="Directory map of local businesses and places"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="site-footer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const dataSources = [
        'data/activities.csv',
        'data/bakeries.csv',
        'data/breweries.csv',
        'data/butchers.csv',
        'data/distilleries.csv',
        'data/farms.csv',
        'data/food-trucks.csv',
        'data/markets.csv',
        'data/pets.csv',
        'data/seafood.csv',
        'data/wineries.csv'
      ];

      initTable({
        dataSources: dataSources,
        tableId: 'data-table',
        searchId: 'search-input',
        countId: 'row-count',
        legendId: 'type-legend',
        mapId: 'map',
        hiddenHeaders: ['Products', 'Best Season', 'Secondary Season', 'Availability']
      });

      window.initDirectoryMap({
        mapId: 'map',
        dataSources: dataSources
      });
    });
  </script>

</body>
</html>
